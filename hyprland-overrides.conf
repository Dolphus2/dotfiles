# Environment Variable overrides
env = BROWSER, firefox
env = DEFAULT_BROWSER, firefox

# Keybinding overrides
# File manager moved from SUPER SHIFT+F to SUPER SHIFT+E (frees E from Email)
unbind = SUPER SHIFT, F
unbind = SUPER SHIFT, E
bindd = SUPER SHIFT, E, File manager, exec, uwsm-app -- nautilus --new-window

# Close window on SUPER+Q
bindd = SUPER, Q, Close active window, killactive


# Remove Signal, ChatGPT, Grok, Google Messages, Google Photos, X
unbind = SUPER SHIFT, G
unbind = SUPER SHIFT, A
unbind = SUPER SHIFT ALT, A
unbind = SUPER SHIFT CTRL, G
unbind = SUPER SHIFT, P
unbind = SUPER SHIFT, X
unbind = SUPER SHIFT ALT, X

# Google Calendar on SUPER SHIFT+C (replaces Hey calendar)
unbind = SUPER SHIFT, C
bindd = SUPER SHIFT, C, Calendar, exec, omarchy-launch-webapp "https://calendar.google.com"

# Gemini on SUPER SHIFT+A, Gmail on SUPER SHIFT ALT+E
bindd = SUPER SHIFT, A, Gemini, exec, omarchy-launch-webapp "https://gemini.google.com"
# bindd = SUPER SHIFT ALT, A, Claude, exec, omarchy-launch-webapp "https://claude.ai"
bindd = SUPER SHIFT ALT, E, Gmail, exec, omarchy-launch-webapp "https://mail.google.com"

# CopyQ clipboard history on SUPER CTRL+V (like Windows)
bindd = SUPER CTRL, V, Clipboard history, exec, copyq toggle

# Flameshot screenshot on SUPER SHIFT+S (like Windows Snipping Tool)
# bindd = SUPER SHIFT, S, Screenshot, exec, flameshot gui

bindd = SUPER SHIFT, S, Screenshot with editing, exec, omarchy-cmd-screenshot

input {
    kb_options = caps:escape_shifted_capslock
}

# Set desktop monitors to the correct offset for my home desktop setup
# env = GDK_SCALE,1
# monitor = DP-2, preferred, 0x0, 1
# monitor = DP-1, preferred, 1920x415, 1

# Swap workspaces between monitors on SUPER SHIFT+Numpad0
bindd = SUPER SHIFT, KP_0, Swap monitor workspaces, swapactiveworkspaces, DP-1 DP-2
